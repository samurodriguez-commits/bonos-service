apiVersion: apps/v1
kind: Deployment

metadata:
  name: bonos-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bonos-service

  template:
    metadata:
      labels:
        app: bonos-service

    spec:
      containers:
      - name: bonos-service
        image:
          546388928625.dkr.ecr.us-east-1.amazonaws.com/bonos-service:latest

        ports:
        - containerPort: 8004

        envFrom:
        - secretRef:
            name: casino-secrets

        resources:
          requests:
            cpu: "100m"

          limits:
            cpu: "500m"

        readinessProbe:
          httpGet:
            path: /readyz
            port: 8004

          initialDelaySeconds:5
          periodSeconds:10

        livenessProbe:
          httpGet:
            path:/livez
            port:8004

          initialDelaySeconds:10
          periodSeconds:15